<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Model Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            height: 90vh;
        }

        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }

        .models-list {
            flex: 1;
            overflow-y: auto;
        }

        .model-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .model-item:hover {
            background: #e8e8e8;
            transform: translateX(4px);
        }

        .model-item.active {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
        }

        .model-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .model-size {
            font-size: 12px;
            opacity: 0.7;
        }

        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message.bot {
            text-align: left;
        }

        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #e8e8e8;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.error .message-content {
            background: #ff6b6b;
            color: white;
        }

        .message.loading .message-content {
            background: #e8e8e8;
            color: #666;
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots span {
            animation: blink 1.4s infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% {
                opacity: 0.5;
            }
            30% {
                opacity: 1;
            }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-group {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #ff6b6b;
        }

        .clear-btn:hover {
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .status {
            padding: 10px 20px;
            background: #f0f0f0;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
        }

        .status-indicator.loading {
            background: #ff9800;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .sidebar {
                display: none;
            }

            .message-content {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>📦 Models</h2>
            <div class="models-list" id="modelsList"></div>
        </div>

        <!-- Chat -->
        <div class="chat-container">
            <!-- Header -->
            <div class="chat-header">
                <h1>💻 Code Model Chat</h1>
                <p>Generate code with AI</p>
            </div>

            <!-- Messages -->
            <div class="messages" id="messages">
                <div class="message bot">
                    <div class="message-content">
                        👋 Welcome to Code Model Chat!<br><br>
                        Select a model from the left and start typing your code prompts.<br><br>
                        Examples:<br>
                        • function fibonacci<br>
                        • def merge_sort<br>
                        • SELECT * FROM users<br>
                        • interface User
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="input-area">
                <div class="input-group">
                    <input
                        type="text"
                        id="promptInput"
                        placeholder="Enter your code prompt..."
                        autocomplete="off"
                    >
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                    <button class="clear-btn" onclick="clearChat()">Clear</button>
                </div>
            </div>

            <!-- Status -->
            <div class="status">
                <div class="status-item">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="statusText">Ready</span>
                </div>
                <div class="status-item">
                    <span id="modelInfo">Model: Universal</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentModel = 'universal-model-v1.pt';
        let isLoading = false;

        // Load models on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadModels();
            document.getElementById('promptInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !isLoading) {
                    sendMessage();
                }
            });
        });

        // Load available models
        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                const models = await response.json();

                const modelsList = document.getElementById('modelsList');
                modelsList.innerHTML = '';

                models.forEach((model, index) => {
                    const div = document.createElement('div');
                    div.className = 'model-item' + (index === 0 ? ' active' : '');
                    div.innerHTML = `
                        <div class="model-name">${model.name}</div>
                        <div class="model-size">${model.size}</div>
                    `;
                    div.onclick = () => selectModel(model.file, model.name, div);
                    modelsList.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading models:', error);
            }
        }

        // Select model
        function selectModel(modelId, modelName, element) {
            currentModel = modelId;
            document.querySelectorAll('.model-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('modelInfo').textContent = `Model: ${modelName}`;
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('promptInput');
            const prompt = input.value.trim();

            if (!prompt || isLoading) return;

            // Add user message
            addMessage(prompt, 'user');
            input.value = '';

            // Show loading
            isLoading = true;
            setStatus('Generating...', true);
            const loadingId = addMessage('Generating code...', 'loading');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        model: currentModel,
                        max_length: 100
                    })
                });

                const data = await response.json();

                if (data.success) {
                    removeMessage(loadingId);
                    addMessage(data.generated, 'bot');
                    setStatus('Ready', false);
                } else {
                    removeMessage(loadingId);
                    addMessage('Error: ' + (data.error || 'Unknown error'), 'error');
                    setStatus('Error', false);
                }
            } catch (error) {
                removeMessage(loadingId);
                addMessage('Error: ' + error.message, 'error');
                setStatus('Error', false);
            } finally {
                isLoading = false;
            }
        }

        // Add message to chat
        function addMessage(text, type) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            const id = 'msg-' + Date.now();
            messageDiv.id = id;
            messageDiv.className = 'message ' + type;

            let content = text;
            if (type === 'loading') {
                content = '<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>';
            }

            messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            return id;
        }

        // Remove message
        function removeMessage(id) {
            const msg = document.getElementById(id);
            if (msg) msg.remove();
        }

        // Clear chat
        function clearChat() {
            document.getElementById('messages').innerHTML = `
                <div class="message bot">
                    <div class="message-content">
                        Chat cleared. Ready for new prompts!
                    </div>
                </div>
            `;
        }

        // Set status
        function setStatus(text, loading) {
            document.getElementById('statusText').textContent = text;
            const indicator = document.getElementById('statusIndicator');
            if (loading) {
                indicator.classList.add('loading');
            } else {
                indicator.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
