model:
  vocab_size: 32000
  n_positions: 2048
  n_embd: 768
  n_layer: 12
  n_head: 12
  activation_function: "gelu_new"

training:
  batch_size: 16
  learning_rate: 1e-6
  num_epochs: 1
  warmup_steps: 5
  weight_decay: 0.1
  fp16: true
  device: "cuda"

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_file_size: 100000
  min_file_size: 100
