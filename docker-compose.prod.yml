version: '3.8'

services:
  code-model-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-model-chat-prod
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - WORKERS=4
    volumes:
      - ./outputs/models:/app/outputs/models:ro
      - ./templates:/app/templates:ro
      - ./logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - code-model-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  code-model-network:
    driver: bridge
