model:
  vocab_size: 32000
  n_positions: 2048
  n_embd: 768
  n_layer: 12
  n_head: 12
  activation_function: "gelu_new"

training:
  batch_size: 16
  learning_rate: 5e-6
  num_epochs: 1
  warmup_steps: 5
  weight_decay: 0.1
  fp16: true
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_file_size: 100000
  min_file_size: 100

# Phase 3C: Full-Stack Integration (React, Express, Django, Flask, Databases, APIs)
# Learning rate: 5e-6 (very low for fine-tuning)
# Epochs: 1 (preserve all prior knowledge)
# Batch size: 16 (fits in T4 GPU)
